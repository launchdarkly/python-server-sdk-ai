[project]
name = "ldai_optimizer"
version = "0.1.0"  # x-release-please-version
description = "LaunchDarkly AI tool — optimizer"
authors = [{name = "LaunchDarkly", email = "dev@launchdarkly.com"}]
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.10,<4"
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "launchdarkly-server-sdk-ai>=0.16.0",
    "coolname>=2.0.0",
]

[project.urls]
Homepage = "https://docs.launchdarkly.com/sdk/ai/python"
Repository = "https://github.com/launchdarkly/python-server-sdk-ai"

[dependency-groups]
dev = [
    "pytest>=2.8",
    "pytest-cov>=2.4.0",
    "pytest-asyncio>=0.21.0,<1.0.0",
    "mypy==1.18.2",
    "pycodestyle>=2.11.0",
    "isort>=5.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ldai_optimizer"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
install_types = true
non_interactive = true

[tool.isort]
profile = "black"
known_third_party = ["ldai"]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]

[tool.pytest.ini_options]
addopts = ["-ra"]
testpaths = ["tests"]
asyncio_mode = "auto"
