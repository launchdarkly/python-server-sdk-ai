name: Quality control checks

on:
  push:
    branches: [ main, 'feat/**' ]
    paths-ignore:
      - '**.md' # Do not need to run CI for markdown changes.
  pull_request:
    branches: [ main, 'feat/**' ]
    paths-ignore:
      - '**.md'

jobs:
  server-ai-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/ci
        with:
          workspace_path: packages/sdk/server-ai
          python_version: ${{ matrix.python-version }}

      - uses: ./.github/actions/build
        with:
          workspace_path: packages/sdk/server-ai

      - uses: ./.github/actions/build-docs

  server-ai-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: make -C packages/sdk/server-ai install

      - name: Run tests
        run: make -C packages/sdk/server-ai test

  server-ai-langchain-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
